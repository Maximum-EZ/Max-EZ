<!DOCTYPE html>
<html lang="en">
<head>
  <title>Classes</title>
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png">
  <link href="assets/css/photography.css" rel="stylesheet">
  <style>
    .searchbar {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      max-width: 90%;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
      display: flex;
    }

    .searchbar input {
      flex-grow: 1;
      padding: 8px;
      border: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <br>
  <br>
  <br>
  <br>
  <div class="searchbar">
    <form>
      <input tag="searchbar" id="searchbar" placeholder="Search the web freely" />
    </form>
  </div>
  
  <script src="./uv/uv.bundle.js"></script>
  <script src="./uv/uv.config.js"></script>
  <script src="assets/js/index.js"></script>
  <script>
    const searchbar = document.getElementById("searchbar");

    searchbar.addEventListener("input", function() {
      if (searchbar.value === '') {
        searchbar.style.width = "25%";
        searchbar.style.height = "60px";
      } else {
        searchbar.style.width = "70%";
        searchbar.style.height = "60px";
      }
    });
  </script>
  
  <img class="home-icon" src="/assets/images/icons/homeicon.svg" />
  <img class="fullscreen-icon" src="/assets/images/icons/fullscreen.svg" />
  <div class="controlpanel">
    <div class="controls">
      <img class="icon" src="/assets/images/branding/favicon/interstellar.ico" />
      <form>
        <input style="font-size: 24px" enabled="disabled" value="" />
      </form>
      <button class="button Fullscreen" id="fullscreen-button" style="margin-right: 5px">Fullscreen</button>
      <button class="button Home" id="home-button">Home</button>
    </div>
  </div>
  
  <script>
    const homeButton = document.getElementById("home-button");
    homeButton.addEventListener("click", function() {
      window.location.href = "./";
    });

    const fullscreenButton = document.getElementById("fullscreen-button");
    fullscreenButton.addEventListener("click", function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
  </script>
  <script>
    window.onload = function() {
      let encodedUrl = sessionStorage.getItem("encodedUrl");
      encodedUrl = "/service/" + encodedUrl;
      document.querySelector("#iframeId").src = encodedUrl;
    };
  </script>
  <iframe src="/loading.html" id="iframeId" name="Iframe" scrolling="yes" allowfullscreen></iframe>
</body>
</html>
