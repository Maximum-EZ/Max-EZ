<!DOCTYPE html>
<html lang="en">
<head>
  <title>Classes</title>
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png">
  <link href="assets/css/photography.css" rel="stylesheet">
  <style>
    .tip {
      width: calc(100% - 37%);
      right: 0;
      bottom: 15px;
      margin: 0 auto;
      font-size: 14px;
      padding: 15px 20px;
      text-align: center;
      position: absolute;
    }

    .controlpanel {
      display: flex;
      position: absolute;
      z-index: 900;
      width: 100%;
      max-width: 500px;
      color: #222;
      font-family: Roboto;
      align-self: center;
      max-height: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .controlpanel .controls {
      background: black;
      transform: translateY(-100%);
      transition: 0.2s;
      visibility: hidden;
      width: 100%;
      padding: 7px 10px;
      display: flex;
      align-items: center;
      border-top: none;
      border-radius: 30px 30px 30px 30px;
      box-shadow: #000000 0px 3px 8px;
      height: 15px;
    }

    .controlpanel:hover .controls {
      transform: none;
      visibility: visible;
      max-height: none;
      height: 51.4px;
    }

    .controlpanel .controls input {
      background: none;
      border: none;
      margin: 0px 20px;
      color: white;
      flex-grow: 1;
      outline: none;
    }

    .controlpanel .controls .icon {
      width: 20px;
      height: 20px;
      margin: 0px 2px;
    }

    .controlpanel .controls .button {
      background: none;
      font-size: 2px;
      cursor: pointer;
      font-family: "Material Icons";
      padding: 2px 7px;
      margin: 0px 2px;
    }

    .home-icon {
      display: none;
    }

    .Home:before {
      content: url(/assets/images/icons/homeicon.svg);
      display: block;
      width: 20px;
      height: 20px;
    }

    .fullscreen-icon {
      display: none;
    }

    .Fullscreen:before {
      content: url(/assets/images/icons/fullscreen.svg);
      display: block;
      width: 20px;
      height: 20px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #iframeId {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <br>
  <br>
  <br>
  <br>
  <div class="searchbar">
    <form onsubmit="loadWebsite(event)">
      <input tag="searchbar" id="searchbar" placeholder="Search the web freely" />
    </form>
  </div>
  <script src="./uv/uv.bundle.js"></script>
  <script src="./uv/uv.config.js"></script>
  <script src="assets/js/index.js"></script>
  <script>
    const searchbar = document.getElementById("searchbar");

    searchbar.addEventListener("input", function() {
      if (searchbar.value === '') {
        searchbar.style.width = "25%";
        searchbar.style.height = "60px";
      } else {
        searchbar.style.width = "70%";
        searchbar.style.height = "60px";
      }
    });
  </script>
  <div>
    <button onclick="goToIndex()">Go Back</button>
  </div>
  
  <script>
    function goToIndex() {
      window.location.href = "./index.html";
    }
  </script>
  <div class="controlpanel">
    <div class="controls">
      <img class="icon" src="/assets/images/branding/favicon/interstellar.ico" />
      <form>
        <input style="font-size: 24px" enabled="disabled" value="" />
      </form>
      <button class="button Fullscreen" id="fullscreen-button" style="margin-right: 5px">Fullscreen</button>
      <button class="button Home" id="home-button">Home</button>
    </div>
  </div>
  <script>
    const homeButton = document.getElementById("home-button");
    homeButton.addEventListener("click", function() {
      window.location.href = "./";
    });

    const fullscreenButton = document.getElementById("fullscreen-button");
    fullscreenButton.addEventListener("click", function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
  </script>
  <script>
    function loadWebsite(event) {
      event.preventDefault(); // Prevent form submission

      const searchbar = document.getElementById("searchbar");
      const url = searchbar.value;

      // Set the URL in the iframe
      document.querySelector("#iframeId").src = url;

      // Clear the searchbar
      searchbar.value = "";
    }
  </script>
  <iframe src="/loading.html" id="iframeId" name="Iframe" scrolling="yes" allowfullscreen></iframe>
</body>
</html>
