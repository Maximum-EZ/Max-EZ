<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Classes</title>
    
    <!-- Set website icon -->
    <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png">

    <!-- Set website description for search engines -->
    <meta name="description" content="From studio portraits to epic alpine landscapes, browse the best photography, retouching and photojournalism today.">

    <!-- Main Stylesheet-->
    <link rel="stylesheet" href="resources/css/main.css">

    <!-- Other Scripts-->
    <link rel="stylesheet" href="assets/css/nav.css">
    <link rel="stylesheet" href="assets/css/searchbar.css">

    <!-- Load website scripts -->
    <script src="assets/js/main.js"></script>
    <script src="/assets/js/themecontrol.js"></script>
  </head>
  <body class="classic midnight">

    <!-- Nav Bar Start-->
    <div class="header2">
      <br>

      <!-- Website logo -->
      <a href="/../" class="logo">Max-EZ</a>
      <div class="header2-right">

        <!-- Navigation links -->
        <a href="photography">Proxy</a>
        <a href="ocean">Apps</a>
      </div>
    </div>
    <br>
    <br>
    <br>
    <br>

    <!-- Nav Bar End-->
    <canvas class="particles-js-canvas-el" style="z-index:10; top:0; left:0; position:absolute; width: 100%; height: 100%;" width="1920" height="942"></canvas>
    <div id="particles-js">

      <!-- Load particles.js library -->
      <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
      <br>
      <br>
      
      <!-- Search bar -->
      <div class="searchbar">
        <form>
          <input tag="searchbar" id="searchbar" placeholder="Search the web freely" />
        </form>
      </div>
      <script>
        // Dynamically resize search bar when input changes
        const searchbar = document.getElementById("searchbar");
        searchbar.addEventListener("input", function() {
          if (searchbar.value === '') {
            // Code to execute if input field is empty
            searchbar.style.width = "25%";
            searchbar.style.height = "60px";
          } else {
            // Code to execute if input field is not empty
            searchbar.style.width = "70%";
            searchbar.style.height = "60px";
          }
        });
      </script>
    </div>
    <div>

      <!-- Load additional scripts -->
      <script src="./uv/uv.bundle.js"></script>
      <script src="./uv/uv.config.js"></script>
      <script src="resources/js/index.js"></script>
    </div>
  </body>
</html>
