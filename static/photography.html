<!DOCTYPE html>
<html lang="en">
<head>
  <title>Classes</title>
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png">
  <link href="assets/css/photography.css" rel="stylesheet">
</head>
<body>
  <br>
  <br>
  <br>
  <br>
  <div class="searchbar">
    <form>
      <input tag="searchbar" id="searchbar" placeholder="Search the web freely" />
    </form>
  </div>
  <script src="./uv/uv.bundle.js"></script>
  <script src="./uv/uv.config.js"></script>
  <script src="assets/js/index.js"></script>
  <script>
    const searchbar = document.getElementById("searchbar");

    searchbar.addEventListener("input", function() {
      if (searchbar.value === '') {
        searchbar.style.width = "25%";
        searchbar.style.height = "60px";
      } else {
        searchbar.style.width = "70%";
        searchbar.style.height = "60px";
      }
    });
  </script>
  <div>
  </div>
  
  <script>
    window.onload = function() {
      let encodedUrl = sessionStorage.getItem("encodedUrl");
      encodedUrl = "/service/" + encodedUrl;
      document.querySelector("#iframeId").src = encodedUrl;
    };
  </script>
  <iframe id="iframeId" name="Iframe" scrolling="yes" allowfullscreen></iframe>
</body>
</html>
