<!DOCTYPE html>
<html lang="en">
<head>
  <title>Classes</title>
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png">
  <link href="assets/css/photography.css" rel="stylesheet">
  <style>
    /* Add any additional styles as needed */
  </style>
</head>
<body>
  <div class="tab-container">
    <div class="tab" onclick="openTab(event, 'tab1')">Tab 1</div>
    <div class="tab" onclick="openTab(event, 'tab2')">Tab 2</div>
    <div class="tab" onclick="openTab(event, 'tab3')">Tab 3</div>
  </div>

  <div id="tab1" class="tab-content">
    <div class="searchbar">
      <form onsubmit="search(event, 'tab1')">
        <input tag="searchbar" id="searchbar-tab1" placeholder="Search the web freely" />
      </form>
    </div>
    <div id="search-results-tab1"></div>
  </div>

  <div id="tab2" class="tab-content">
    <div class="searchbar">
      <form onsubmit="search(event, 'tab2')">
        <input tag="searchbar" id="searchbar-tab2" placeholder="Search the web freely" />
      </form>
    </div>
    <div id="search-results-tab2"></div>
  </div>

  <div id="tab3" class="tab-content">
    <div class="searchbar">
      <form onsubmit="search(event, 'tab3')">
        <input tag="searchbar" id="searchbar-tab3" placeholder="Search the web freely" />
      </form>
    </div>
    <div id="search-results-tab3"></div>
  </div>

  <script>
    function openTab(event, tabName) {
      // Hide all tab contents
      const tabContents = document.getElementsByClassName("tab-content");
      for (let i = 0; i < tabContents.length; i++) {
        tabContents[i].style.display = "none";
      }
      
      // Show the selected tab content
      const selectedTab = document.getElementById(tabName);
      selectedTab.style.display = "block";
    }

    function search(event, tabName) {
      event.preventDefault();
      const searchbar = document.getElementById(`searchbar-${tabName}`);
      const searchResults = document.getElementById(`search-results-${tabName}`);
      const searchQuery = searchbar.value;

      // Perform your search logic here (e.g., API call, data processing)
      // You can update the searchResults with the fetched or processed data
      // For simplicity, let's just display the search query in the search results
      searchResults.textContent = `Search results for "${searchQuery}"`;
    }
  </script>

  <iframe src="/loading.html" id="iframeId" name="Iframe" scrolling="yes" allowfullscreen></iframe>
</body>
</html>
