<!-- 
The following code defines the HTML structure and styling for a 
loading page with a spinning animation, a message, and a description. 
The code has been formatted to improve readability and organization, 
and comments have been added to explain the purpose of certain elements.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Sets the viewport for responsive design -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Links to the Google Fonts API -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Adds a description of the page for SEO purposes -->
  <meta name="description" content="From studio portraits to epic alpine landscapes, browse the best photography, retouching and photojournalism today."/>
  <!-- Links to the Google Fonts used on the page -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Roboto&display=swap" rel="stylesheet">
  <!-- Defines the CSS styling for the page -->
  <style>
    body {
      background-color: #831919;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    a {
      color: #ffffff;
      text-decoration: none;
      transition: color 0.3s ease-in-out;
    }

    a:hover {
      color: #3498db;
    }

    #loader {
      position: relative;
      width: 150px;
      height: 150px;
      border: 16px solid #f3f3f3;
      border-top: 16px solid #3498db;
      border-radius: 50%;
      animation: spin 2s linear infinite;
      margin-bottom: 35px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .message {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .description {
      color: #FFF;
      font-size: 20px;
      line-height: 1.5;
      max-width: 600px;
      text-align: center;
      margin-top: 20px;
    }

    .animate-bottom {
      animation-name: animatebottom;
      animation-duration: 1s;
    }

    @keyframes animatebottom {
      from {
        bottom: -100px;
        opacity: 0;
      }

      to {
        bottom: 0;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <!-- Adds a spinning animation to indicate the page is loading -->
  <div id="loader"></div>
  <!-- Displays a message to the user while the page is loading -->
  <div class="message animate-bottom">
    <p class="description">
      Please wait a moment. Our servers may be under high load causing some slowness.
    </p>
  </div>
</body>
</html>
