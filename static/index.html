<!DOCTYPE html>
<html>
<head>
  <title>Button Website</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="resources/js/main.js"></script>   
</head>
<body>
  <div class="container">
    <div class="square">
      <a href="photography">
        <img src="images/web.ico" alt="Web" />
      </a>
    </div>
    <div class="square">
      <a href="#">
        <img src="images/games.ico" alt="Games" />
      </a>
    </div>
    <div class="square">
      <a href="#">
        <img src="images/apps.ico" alt="Apps" />
      </a>
    </div>
    <div class="square">
      <a href="#">
        <img src="images/settings.ico" alt="Settings" />
      </a>
    </div>
  </div>

  <script>
    if (localStorage.getItem('cloak')) {
      const cloakValue = localStorage.getItem('cloak') === 'true' ? 'true' : 'false';
      const squareElements = document.getElementsByClassName('square');
      for (let i = 0; i < squareElements.length; i++) {
        squareElements[i].style.display = cloakValue === 'true' ? 'none' : 'block';
      }
    }
  </script>
  <script src="index.js"></script>
</body>
</html>
