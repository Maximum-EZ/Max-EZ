<!DOCTYPE html>
<html>
<head>
  <title>Mountain Landscape</title>
  <style>
    img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
    }
    .caption {
      text-align: center;
      font-size: 24px;
      margin-top: 10px;
      color: #333;
    }
  </style>
  <script>
    window.addEventListener('resize', function() {
      var img = document.querySelector('img');
      img.style.marginTop = (window.innerHeight - img.offsetHeight) / 2 + 'px';
    });
  </script>
</head>
<body>
  <img src="https://i.imgur.com/Ofn4QcM.jpg" alt="Mountain Landscape">
  <p class="caption">A beautiful mountain landscape with clouds and blue sky</p>
</body>
</html>
