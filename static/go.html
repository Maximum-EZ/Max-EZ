<!DOCTYPE html>
<html lang="en">
<head>
  <title>Classes</title>
  <meta name="description" content="Stay secure online with our powerful proxy service that safeguards your privacy and keeps you anonymous. Browse the web privately, shield your sensitive data from prying eyes, and access geo-restricted content effortlessly. Our reliable proxy solution ensures encrypted connections and seamless browsing, providing you with peace of mind and freedom online. Experience a safer and more unrestricted internet today!" />
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png" />
  <link rel="shortcut icon" href="assets/images/branding/favicon/favicon.png" type="image/x-icon" />
  <link rel="stylesheet" href="assets/css/go.css" />
</head>
<body>
  <img class="home-icon" src="/assets/images/icons/homeicon.svg" />
  <img class="fullscreen-icon" src="/assets/images/icons/fullscreen.svg" />
  <div class="controlpanel">
    <div class="controls">
      <img class="icon" src="/assets/images/branding/favicon/interstellar.ico" />
      <form>
        <input style="font-size: 24px" enabled="disabled" value="" />
      </form>
      <button class="button Fullscreen" id="fullscreen-button" style="margin-right: 5px">Fullscreen</button>
      <button class="button Home" id="home-button">Home</button>
    </div>
  </div>
  <iframe src="/loading.html" id="iframeId" name="Iframe" scrolling="yes" allowfullscreen></iframe>

  <script async src="assets/js/main.js"></script>
  <script async>
    document.addEventListener("DOMContentLoaded", function() {
      const homeButton = document.getElementById("home-button");
      homeButton.addEventListener("click", function () {
        window.location.href = "./";
      });

      const fullscreenButton = document.getElementById("fullscreen-button");
      fullscreenButton.addEventListener("click", function () {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });

      let encodedUrl = sessionStorage.getItem("encodedUrl");
      encodedUrl = "/service/" + encodedUrl;
      document.querySelector("#iframeId").src = encodedUrl;
    });
  </script>
</body>
</html>
