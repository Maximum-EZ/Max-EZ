<!DOCTYPE html>
<html lang="en" style="margin: 0">
<head>
  <title>Classes</title>
  <meta name="description" content="From studio portraits to epic alpine landscapes, browse the best photography, retouching and photojournalism today."/>
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png" />
  <link rel="shortcut icon" href="assets/images/branding/favicon/favicon.png" type="image/x-icon" />
  <style>
    .tab {
      background-color: #f1f1f1;
      border: none;
      color: #000;
      cursor: pointer;
      padding: 8px 16px;
      font-size: 14px;
      transition: 0.3s;
      display: inline-block;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .tabcontent {
      display: none;
      padding: 16px;
      background-color: #f9f9f9;
      border-top: none;
      border: 1px solid #ddd;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .active {
      background-color: #ddd;
    }

    #searchbar1,
    #searchbar2 {
      width: 100%;
      height: 40px;
      margin-top: 8px;
      font-size: 16px;
      padding: 8px;
      border: none;
      border-bottom: 1px solid #ddd;
    }

    .iframe-container {
      position: relative;
      overflow: hidden;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
    }

    .responsive-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="tab-container">
    <button class="tab" onclick="openTab(event, 'tab1')">Tab 1</button>
    <button class="tab" onclick="openTab(event, 'tab2')">Tab 2</button>
  </div>
  
  <div id="tab1" class="tabcontent">
    <form onsubmit="loadWebsite(event, 'iframe1')">
      <input type="text" id="searchbar1" placeholder="Search in Tab 1">
    </form>
    <div class="iframe-container">
      <iframe id="iframe1" class="responsive-iframe"></iframe>
    </div>
  </div>

  <div id="tab2" class="tabcontent">
    <form onsubmit="loadWebsite(event, 'iframe2')">
      <input type="text" id="searchbar2" placeholder="Search in Tab 2">
    </form>
    <div class="iframe-container">
      <iframe id="iframe2" class="responsive-iframe"></iframe>
    </div>
  </div>

  <script>
    function openTab(evt, tabName) {
      var i, tabcontent, tablinks;

      tabcontent = document.getElementsByClassName("tabcontent");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }

      tablinks = document.getElementsByClassName("tab");
      for (i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }

      document.getElementById(tabName).style.display = "block";
      evt.currentTarget.className += " active";
    }

    function loadWebsite(event, iframeId) {
      event.preventDefault();
      var searchbarId = event.target.querySelector("input").id;
      var url = document.getElementById(searchbarId).value;
      var encodedUrl = encodeURIComponent(url);
      var iframe = document.getElementById(iframeId);
      iframe.src = "https://www.google.com/search?q=" + encodedUrl;
    }
  </script>
</body>
</html>
