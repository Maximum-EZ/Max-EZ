<!DOCTYPE html>
<html lang="en" style="margin: 0">
<head>
  <title>Classes</title>
  <meta name="description" content="From studio portraits to epic alpine landscapes, browse the best photography, retouching and photojournalism today."/>
  <link rel="icon" type="image/x-icon" href="assets/images/branding/favicon/favicon.png" />
  <link rel="shortcut icon" href="assets/images/branding/favicon/favicon.png" type="image/x-icon" />
  <style>
    .tab {
      background-color: #f1f1f1;
      border: none;
      color: #000;
      cursor: pointer;
      padding: 8px 16px;
      font-size: 14px;
      transition: 0.3s;
      display: inline-block;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .tabcontent {
      display: none;
      padding: 16px;
      background-color: #f9f9f9;
      border-top: none;
      border: 1px solid #ddd;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .active {
      background-color: #ddd;
    }

    #iframeId {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 40px);
      border: none;
    }
  </style>
</head>
<body>
  <div>
    <button class="tab" onclick="openTab(event, 'tab1')">Tab 1</button>
    <button class="tab" onclick="openTab(event, 'tab2')">Tab 2</button>
  </div>

  <div id="tab1" class="tabcontent" style="display: block;">
    <iframe src="https://www.google.com" id="iframeId" name="Iframe" scrolling="yes"></iframe>
  </div>

  <div id="tab2" class="tabcontent">
    <iframe src="https://www.bing.com" id="iframeId" name="Iframe" scrolling="yes"></iframe>
  </div>

  <script>
    function openTab(event, tabName) {
      var i, tabcontent, tablinks;

      tabcontent = document.getElementsByClassName("tabcontent");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }

      tablinks = document.getElementsByClassName("tab");
      for (i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }

      document.getElementById(tabName).style.display = "block";
      event.currentTarget.className += " active";
    }
  </script>
</body>
</html>
